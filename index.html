  <script>
    // Keep the neon hero text locked to her foot as the photo re-crops on resize.
    (function () {
      var img  = document.querySelector('.hero-photo');
      var wrap = document.querySelector('.hero-photo-wrap');
      var text = document.querySelector('.hero-content');
      var name = document.querySelector('.hero-name');
      if (!img || !wrap || !text || !name) return;

      var NAT_W = 2276, NAT_H = 1519; // natural size of 00720_21.jpg
      var FOOT_FX = 0.336;            // horizontal point in the image (her foot/toe)
      var FOOT_FY = 0.57;             // vertical point in the image the text sits at
      var OBJ_POS_X = 0.50;           // object-position horizontal: center
      var OBJ_POS_Y = 0.52;           // object-position vertical: 52%

      // Auto-fit: text spans from LEFT_MARGIN to just past the foot, font scales to fit.
      var REF_FONT = 100;             // font size at which the text width was measured
      var NAT_W100 = 454;             // width of "SWEET BOY" at REF_FONT px
      var LEFT_MARGIN = 48;           // keep text this far from the left edge
      var OVERLAP = 50;               // text right edge sits this far past the foot
      var MIN_FONT = 40, MAX_FONT = 104;

      function place() {
        var cW = wrap.offsetWidth, cH = wrap.offsetHeight;
        if (!cW || !cH) return;
        // On mobile the photo crops too differently for foot-tracking — use CSS fallback.
        if (window.innerWidth <= 760) {
          text.style.left = '';
          text.style.top  = '';
          name.style.fontSize = '';
          return;
        }
        var scale = Math.max(cW / NAT_W, cH / NAT_H); // object-fit: cover
        var rendW = NAT_W * scale, rendH = NAT_H * scale;
        var offsetX = (cW - rendW) * OBJ_POS_X;
        var offsetY = (cH - rendH) * OBJ_POS_Y;
        var footX = offsetX + rendW * FOOT_FX;

        var rightEdge = footX + OVERLAP;
        var avail = rightEdge - LEFT_MARGIN;
        var font = Math.max(MIN_FONT, Math.min(MAX_FONT, REF_FONT * avail / NAT_W100));
        var w = NAT_W100 * font / REF_FONT;
        var left = rightEdge - w;
        if (left < LEFT_MARGIN) left = LEFT_MARGIN;

        name.style.fontSize = font + 'px';
        text.style.left = left + 'px';
        text.style.top  = (offsetY + rendH * FOOT_FY) + 'px';
      }

      if (window.ResizeObserver) {
        new ResizeObserver(place).observe(wrap);
      }
      window.addEventListener('resize', place);
      place();
      if (!img.complete) img.addEventListener('load', place);
    })();
  </script>
